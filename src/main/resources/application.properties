# ===================================================================
# DATASOURCE
# ===================================================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ManagementSportDB;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===================================================================
# JPA / HIBERNATE
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# CORS Configuration
# ===================================================================
# Permite cualquier origen para facilitar las pruebas de desarrollo locales.
# NO USAR ESTA CONFIGURACIÓN EN PRODUCCIÓN.
cors.allowed-origins=*
