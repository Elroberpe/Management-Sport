# ===================================================================
# DATASOURCE
# Los valores sensibles se leen desde variables de entorno.
# ===================================================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ManagementSportDB;encrypt=true;trustServerCertificate=true;
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===================================================================
# JPA / HIBERNATE
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# CORS Configuration
# ===================================================================
cors.allowed-origins=*

# ===================================================================
# Application Security
# El valor sensible se lee desde una variable de entorno.
# ===================================================================
application.security.jwt.secret-key=${JWT_SECRET_KEY}
# Expiraciˇn para el Access Token (ej. 24 horas - lo cambiaremos a 15 min al final)
application.security.jwt.expiration=900000
# Expiraciˇn para el Refresh Token (7 dÝas)
application.security.jwt.refresh-token.expiration=604800000
