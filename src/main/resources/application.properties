# ===================================================================
# DATASOURCE
# Los valores sensibles se leen desde variables de entorno.
# ===================================================================
# --- SQL Server (Comentado para usar PostgreSQL) ---
# spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ManagementSportDB;encrypt=true;trustServerCertificate=true;
# spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# --- PostgreSQL (Para Render u otro entorno) ---
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ===================================================================
# JPA / HIBERNATE
# ===================================================================
# --- SQL Server (Comentado) ---
# spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# --- PostgreSQL ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Cambiado a 'update' para que cree las tablas en la nueva base de datos de Render automáticamente.
spring.jpa.hibernate.ddl-auto=update

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# CORS Configuration
# ===================================================================
cors.allowed-origins=*

# ===================================================================
# Application Security
# El valor sensible se lee desde una variable de entorno.
# ===================================================================
application.security.jwt.secret-key=${JWT_SECRET_KEY}
# Expiración para el Access Token (ej. 24 horas - lo cambiaremos a 15 min al final)
application.security.jwt.expiration=900000
# Expiración para el Refresh Token (7 días)
application.security.jwt.refresh-token.expiration=604800000