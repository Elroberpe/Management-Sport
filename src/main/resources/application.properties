# ===================================================================
# DATASOURCE
# Los valores sensibles se leen desde variables de entorno.
# ===================================================================
# --- SQL Server (Comentado para usar PostgreSQL en el futuro) ---
# spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ManagementSportDB;encrypt=true;trustServerCertificate=true;
# spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# --- PostgreSQL (Para Render u entorno local) ---
# Si no está definida DB_URL usará el localhost de la derecha.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ManagementSportDB}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}

# ===================================================================
# JPA / HIBERNATE
# ===================================================================
# --- SQL Server (Comentado) ---
# spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# --- PostgreSQL ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# En 'update' crea y actualiza tablas automáticamente.
spring.jpa.hibernate.ddl-auto=update

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# CORS Configuration
# ===================================================================
cors.allowed-origins=*

# ===================================================================
# Application Security
# ===================================================================
application.security.jwt.secret-key=${JWT_SECRET_KEY:my_super_secret_key_for_local_development_only_12345}
# Expiración para el Access Token (ej. 24 horas - lo cambiaremos a 15 min al final)
application.security.jwt.expiration=900000
# Expiración para el Refresh Token (7 días)
application.security.jwt.refresh-token.expiration=604800000