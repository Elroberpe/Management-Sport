spring.application.name=Management-Sport

# ===================================================================
# Database Configuration (SQL Server with SQL Authentication)
# ===================================================================
spring.datasource.url=jdbc:sqlserver://CARLOS-NOTEBOOK:1433;databaseName=ManagementSportDB;encrypt=true;trustServerCertificate=true;

spring.datasource.username=sa
spring.datasource.password=123456

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA/Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Estrategia de nombrado fĒsico para que coincida con las may·sculas de las tablas
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Server
server.port=8080
